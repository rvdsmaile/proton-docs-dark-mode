<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Proton Docs Dark Mode</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <h1>Proton Docs Dark Mode</h1>
      <label class="toggle">
        <input id="enabled" type="checkbox">
        <span>Enable on Proton Docs</span>
      </label>
      <p>Local only. Toggle quickly with <kbd>⌘</kbd>/<kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>D</kbd>.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
